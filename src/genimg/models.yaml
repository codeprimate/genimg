# Default model IDs and suggestion lists for genimg.
# Runtime defaults are loaded by config.py via models.py; env vars override.
# OpenRouter image-generation models (output_modalities includes "image").
# From https://openrouter.ai/collections/image-models — no repeats.
# allow_custom_value in the UI lets users type any model ID.

image_models:
  - google/gemini-3-pro-image-preview
  - google/gemini-2.5-flash-image
  - openai/gpt-5-image
  - openai/gpt-5-image-mini
  - black-forest-labs/flux.2-pro
  - black-forest-labs/flux.2-max
  - black-forest-labs/flux.2-flex
  - black-forest-labs/flux.2-klein-4b
  - bytedance-seed/seedream-4.5
  - sourceful/riverflow-v2-max-preview
  - sourceful/riverflow-v2-standard-preview
  - sourceful/riverflow-v2-fast-preview
  - sourceful/riverflow-v2-pro
  - sourceful/riverflow-v2-fast
  - openrouter/auto

default_image_model: "bytedance-seed/seedream-4.5"

# Ollama image-generation models are enumerated dynamically (x/ and my/ namespaces).
# default_ollama_image_model pins the preferred default when provider is ollama.
default_ollama_image_model: "x/z-image-turbo"

# Draw Things: checkpoint choices come from the Draw Things app catalog.
# No static list or default here (use GENIMG_DRAW_THINGS_DEFAULT_MODEL).

# Ollama prompt optimization models are enumerated dynamically via /api/tags.
# default_optimization_model pins the preferred default; UI allow_custom_value accepts any ID.
default_optimization_model: "huihui_ai/gemma-4-abliterated:e4b"