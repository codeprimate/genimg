# UI model lists for genimg Gradio UI.
# OpenRouter image-generation models (output_modalities includes "image").
# From https://openrouter.ai/collections/image-models — no repeats.
# allow_custom_value in the UI lets users type any model ID.

image_models:
  - google/gemini-3-pro-image-preview
  - google/gemini-2.5-flash-image
  - openai/gpt-5-image
  - openai/gpt-5-image-mini
  - black-forest-labs/flux.2-pro
  - black-forest-labs/flux.2-max
  - black-forest-labs/flux.2-flex
  - black-forest-labs/flux.2-klein-4b
  - bytedance-seed/seedream-4.5
  - sourceful/riverflow-v2-max-preview
  - sourceful/riverflow-v2-standard-preview
  - sourceful/riverflow-v2-fast-preview
  - sourceful/riverflow-v2-pro
  - sourceful/riverflow-v2-fast
  - openrouter/auto

default_image_model: "bytedance-seed/seedream-4.5"

# Ollama image-generation models (see https://ollama.com/blog/image-generation).
ollama_image_models:
  - x/z-image-turbo
  - x/flux2-klein
default_ollama_image_model: "x/z-image-turbo"

# Draw Things (Gradio): dropdown choices are preset ids from `genimg.core.providers.draw_things.presets`
# (`draw_things_preset_ids()`), not the list below. Keep `default_draw_things_image_model` as a
# checkpoint filename: on load, the UI picks the preset whose `default_model` equals this value;
# if none match, the first registered preset id is the default.
draw_things_image_models: []
default_draw_things_image_model: "moodymix_zitv10dpo_f16.ckpt"

# Ollama models for prompt optimization (dropdown suggestions; user can type another).
default_optimization_model: "huihui_ai/qwen3.5-abliterated:4b"
optimization_models:
  - huihui_ai/qwen3.5-abliterated:4b
